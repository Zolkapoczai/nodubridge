<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODU Bridge - Bejelentkezés</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>NODU Bridge</h1>
            <p>Belépés szükséges</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Felhasználónév</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Jelszó</label>
                <input type="password" id="password" name="password" required autocomplete="off">
                <div class="error" id="errorMsg">Hibás felhasználónév vagy jelszó</div>
            </div>

            <button type="submit">Bejelentkezés</button>
        </form>
    </div>

    <script>
        const CORRECT_USERNAME = 'FDB';
        const CORRECT_PASSWORD = 'Nod@Bridge2026#Secure';
        const SESSION_KEY = 'nodu_bridge_auth';

        window.addEventListener('load', () => {
            if (isAuthenticated()) {
                redirectToDashboard();
            }
        });

        function isAuthenticated() {
            return sessionStorage.getItem(SESSION_KEY) === 'authenticated';
        }

        function setAuthenticated() {
            sessionStorage.setItem(SESSION_KEY, 'authenticated');
        }

        function redirectToDashboard() {
            window.location.href = 'nodu-bridge-vezetoi-osszefoglalo.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === CORRECT_USERNAME && password === CORRECT_PASSWORD) {
                errorMsg.classList.remove('show');
                setAuthenticated();
                redirectToDashboard();
            } else {
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('username').focus();
            }
        });
    </script>
</body>
</html>
